<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button (click)="onBack()">
        <ion-icon slot="icon-only" name="arrow-back-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>Settings</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="settings-content">
  <div class="settings-list">
    <!-- CONTACT US -->
    <div class="settings-item" (click)="onContactUs()">
      <ion-icon name="mail-outline" class="settings-icon"></ion-icon>
      <span class="settings-label">Contact Us</span>
    </div>

    <!-- DELETE ACCOUNT -->
    <div class="settings-item danger" (click)="onDeleteAccount()">
      <ion-icon name="trash-outline" class="settings-icon"></ion-icon>
      <span class="settings-label">Delete Account</span>
    </div>
  </div>

  <!-- CONTACT FORM (shows inline when tapped) -->
  <div class="contact-form" *ngIf="showContactForm">
    <p class="contact-intro">
      Have a question or feedback? We'll get back to you soon.
    </p>
    <ion-textarea
      fill="outline"
      mode="md"
      placeholder="Write your message..."
      [(ngModel)]="contactMessage"
      rows="6"
    ></ion-textarea>

    <div *ngIf="contactError" class="error-message">
      <p>{{ contactError }}</p>
    </div>
    <div *ngIf="contactSuccess" class="success-message">
      <p>{{ contactSuccess }}</p>
    </div>
    <ion-button (click)="onSendMessage()" [disabled]="isSending">
      <ion-spinner *ngIf="isSending" name="crescent"></ion-spinner>
      <span *ngIf="!isSending">Send Message</span>
    </ion-button>
  </div>
</ion-content>
