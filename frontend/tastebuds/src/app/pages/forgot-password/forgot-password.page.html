<ion-content class="forgotpw-content">
  <div class="forgotpw-container">
    <!-- Logo -->
    <div class="logo-container">
      <h1 class="app-name">TasteBuds</h1>
    </div>

    <!-- Header -->
    <div class="header-container">
      <h2>Forgot Password?</h2>
      <p>Enter your username or email and we'll send you a reset link</p>
    </div>

    <!-- Form -->
    <div class="form-container">
      <ion-input
        label="Username or Email"
        fill="outline"
        labelPlacement="floating"
        type="text"
        [(ngModel)]="usernameOrEmail"
      >
      </ion-input>

      <!-- Error Message -->
      <div *ngIf="errorMessage" class="error-message">
        <p>{{ errorMessage }}</p>
      </div>

      <!-- Success Message -->
      <div *ngIf="successMessage" class="success-message">
        <p>{{ successMessage }}</p>
      </div>

      <ion-button
        expand="block"
        (click)="onForgotPassword()"
        [disabled]="isLoading"
      >
        <ion-spinner *ngIf="isLoading" name="crescent"></ion-spinner>
        <span *ngIf="!isLoading">Send Reset Link</span>
      </ion-button>
    </div>

    <!-- Back to login -->
    <div class="back-link">
      <p>Remember your password? <span routerLink="/login">Log in</span></p>
    </div>
  </div>
</ion-content>
