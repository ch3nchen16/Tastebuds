<ion-header>
  <ion-toolbar>
    <ion-title>Search</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="search-content">
  <!-- SEARCH BAR -->
  <div class="search-container">
    <ion-searchbar
      placeholder="Search users, restaurants, recipes..."
      [(ngModel)]="searchQuery"
      (ionInput)="onSearch($event)"
      debounce="500"
      animated
    >
      <!-- debounce="500" - waits 500 ms after user stops typing (prevents too many api calls)-->
    </ion-searchbar>
  </div>

  <!-- Loading Spinner -->
  <div class="loading-container" *ngIf="isLoading">
    <ion-spinner name="crescent"></ion-spinner>
  </div>

  <!-- SEARCH RESULTS -->
  <div *ngIf="!isLoading && hasSearched">
    <!-- Users Section -->
    <div *ngIf="userResults.length > 0">
      <div class="section-header">Users</div>
      <div class="results-container">
        <div
          class="user-item"
          *ngFor="let user of userResults"
          (click)="onUserClick(user.username)"
        >
          <img
            *ngIf="user.profile_picture"
            [src]="user.profile_picture"
            class="user-avatar"
          />
          <div *ngIf="!user.profile_picture" class="avatar-placeholder">
            <ion-icon name="person-circle-outline"></ion-icon>
          </div>
          <div class="user-info">
            <span class="user-username">{{user.username}}</span>
            <span class="user-displayname" *ngIf="user.display_name"
              >{{user.display_name}}</span
            >
          </div>
        </div>
      </div>
    </div>

    <!-- Posts Section -->
    <div *ngIf="postResults.length > 0">
      <div class="section-header">Posts</div>
      <div class="posts-grid">
        <div
          class="post-item"
          *ngFor="let post of postResults"
          (click)="onPostClick(post.id)"
        >
          <img
            *ngIf="post.media[0]?.media_type === 'image'"
            [src]="post.media[0]?.media_url"
            class="post-thumbnail"
          />
          <video
            *ngIf="post.media[0]?.media_type === 'video'"
            [src]="post.media[0]?.media_url"
            class="post-thumbnail"
          ></video>
          <!-- Post type badge -->
          <div
            class="post-badge"
            [class.recipe-badge]="post.post_type === 'recipe'"
            [class.review-badge]="post.post_type === 'review'"
          >
            {{post.post_type === 'recipe' ? 'Recipe' : 'Review'}}
          </div>
        </div>
      </div>
    </div>

    <!-- No Results -->
    <div
      class="no-results"
      *ngIf="userResults.length === 0 && postResults.length === 0"
    >
      <ion-icon name="search-outline" class="no-results-icon"></ion-icon>
      <p>No results found for "{{searchQuery}}"</p>
    </div>
  </div>

  <!-- Initial State -->
  <div class="initial-state" *ngIf="!hasSearched && !isLoading">
    <ion-icon name="search-outline" class="initial-icon"></ion-icon>
    <p>Search for users, restaurants or recipes</p>
  </div>
</ion-content>
